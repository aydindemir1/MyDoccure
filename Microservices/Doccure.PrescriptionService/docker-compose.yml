services:
  postgresql:
    image: postgres:17
    container_name: postgresql-server
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "YourStrong!Passw0rd"
      POSTGRES_DB: DoccurePrescriptionDb
    ports:
      - "5433:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data

volumes:
  postgresql_data: